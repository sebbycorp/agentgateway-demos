apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: option-a
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /option-a
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: f5-guardrails-inline
      group: agentgateway.dev
      kind: AgentgatewayBackend
