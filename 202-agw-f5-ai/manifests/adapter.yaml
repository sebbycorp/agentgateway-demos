apiVersion: apps/v1
kind: Deployment
metadata:
  name: f5-guardrails-adapter
  namespace: agentgateway-system
  labels:
    app: f5-guardrails-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f5-guardrails-adapter
  template:
    metadata:
      labels:
        app: f5-guardrails-adapter
    spec:
      containers:
      - name: adapter
        image: f5-guardrails-adapter:local
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: F5_AISEC_URL
          value: "__F5_AISEC_URL__"
        - name: CAI_PROJECT
          value: "__CAI_PROJECT__"
        - name: F5_AISEC_TOKEN
          valueFrom:
            secretKeyRef:
              name: calypsoai-token
              key: Authorization
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: f5-guardrails-adapter
  namespace: agentgateway-system
spec:
  selector:
    app: f5-guardrails-adapter
  ports:
  - name: http
    port: 8000
    targetPort: 8000
