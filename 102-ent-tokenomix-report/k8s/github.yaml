# GitHub MCP via AGW fronting GitHub's hosted remote MCP server.
# AGW injects the PAT as an upstream Bearer header (from a Secret, sed-substituted
# from gitignored .env) and connects over TLS with SNI. No local image needed.
apiVersion: v1
kind: Secret
metadata: { name: github-secret, namespace: agentgateway-system }
type: Opaque
stringData:
  # AGW auth.secretRef reads the value from the "Authorization" key; the auth
  # policy prepends the "Bearer " prefix.
  Authorization: "__GITHUB_TOKEN__"
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata: { name: real-github-std, namespace: agentgateway-system }
spec:
  entMcp:
    toolMode: Standard
    targets:
      - name: github
        static:
          host: api.githubcopilot.com
          port: 443
          protocol: StreamableHTTP
          path: /mcp/
          policies:
            tls: { sni: api.githubcopilot.com }
            auth:
              secretRef: { name: github-secret }
              location:
                header: { name: Authorization, prefix: "Bearer " }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: { name: real-github-std, namespace: agentgateway-system }
spec:
  parentRefs: [{ name: agentgateway-proxy, namespace: agentgateway-system }]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /mcp/real-github } }]
      filters: [{ type: URLRewrite, urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /mcp } } }]
      backendRefs: [{ name: real-github-std, group: enterpriseagentgateway.solo.io, kind: EnterpriseAgentgatewayBackend }]
