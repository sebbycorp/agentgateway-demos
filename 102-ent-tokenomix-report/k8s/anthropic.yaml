apiVersion: v1
kind: Secret
metadata:
  name: anthropic-secret
  namespace: agentgateway-system
type: Opaque
stringData:
  Authorization: "__ANTHROPIC_API_KEY__"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: claude-sonnet-4-6
  policies:
    auth:
      secretRef:
        name: anthropic-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /anthropic
    backendRefs:
    - name: anthropic
      group: agentgateway.dev
      kind: AgentgatewayBackend
---
# Enables Anthropic prompt caching (caches system + tool definitions). NOTE: in
# AGW v2026.6.1 the cache tokens did not surface in usage during testing, so the
# demo MODELS Anthropic cache economics in projection.py (1.25x write / 0.1x read).
# The policy is included as the documented, forward-compatible enablement.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: anthropic-prompt-caching
  namespace: agentgateway-system
spec:
  targetRefs:
  - kind: AgentgatewayBackend
    group: agentgateway.dev
    name: anthropic
  backend:
    ai:
      promptCaching:
        cacheSystem: true
        cacheMessages: true
        cacheTools: true
