# GitHub remote MCP + elicitation policy (no static PAT — token comes from STS).
# Docs: https://docs.solo.io/agentgateway/latest/mcp/token-exchange/elicitations/original/
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: github-mcp-backend
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: mcp-target
        static:
          host: api.githubcopilot.com
          port: 443
          path: /mcp/
          policies:
            tls:
              sni: api.githubcopilot.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-github
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp-github
      filters:
        - type: CORS
          cors:
            allowHeaders:
              - "*"
            allowMethods:
              - "*"
            allowOrigins:
              - "http://localhost:8080"
              - "http://localhost:6274"
              - "http://127.0.0.1:6274"
      backendRefs:
        - name: github-mcp-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: github-mcp-elicit-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - name: github-mcp-backend
      kind: AgentgatewayBackend
      group: agentgateway.dev
  backend:
    tokenExchange:
      elicitation:
        secretName: elicitation-oidc
