binds:
- port: 3000
  listeners:
  - routes:
    - policies:
        cors:
          allowOrigins:
          - '*'
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - mcp-session-id
          exposeHeaders:
          - Mcp-Session-Id
      backends:
      - mcp:
          targets:
          - name: everything
            stdio:
              cmd: npx
              args:
              - '@modelcontextprotocol/server-everything'
llm:
  port: 4000
  models: []
  providers: []
  virtualModels: []
frontendPolicies:
  http:
    maxBufferSize: 33554432
config:
  modelCatalog:
  - file: base-costs.json
