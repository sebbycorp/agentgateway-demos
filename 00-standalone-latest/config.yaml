# yaml-language-server: $schema=https://agentgateway.dev/schema/config
#
# Cost & tokenomics dashboard demo config (generated by setup.sh).
# The admin UI Costs/Analytics pages read config.database; the mock generator
# writes the same request_logs schema, so the dashboard is pre-populated.
config:
  adminAddr: "0.0.0.0:15000"        # admin UI + dashboards (reachable from host)
  database:
    url: "sqlite:///data/data.db"   # /data is the mounted ./data dir in the container
  modelCatalog:
    - file: /base-costs.json        # per-model rates so every request is priced

llm:
  port: 4000
  policies:
    cors:                             # demo-only: wildcard CORS lets any browser
                                      # origin call the proxy. Safe because the
                                      # port is loopback-bound (see setup.sh).
                                      # Restrict allowOrigins for any real exposure.
      allowOrigins: ["*"]
      allowHeaders: ["*"]
      allowMethods: ["GET", "POST", "OPTIONS"]
  models:
    - name: "openai/gpt-4.1"
      provider: openAI
      params:
        model: gpt-4.1
        apiKey: "$OPENAI_API_KEY"
    - name: "openai/*"              # fallback: cheaper nano model
      provider: openAI
      params:
        model: gpt-4.1-nano
        apiKey: "$OPENAI_API_KEY"

frontendPolicies:
  http:
    maxBufferSize: 33554432
