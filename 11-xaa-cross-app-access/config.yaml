# yaml-language-server: $schema=https://agentgateway.dev/schema/config
binds:
- port: 3000
  listeners:
  - protocol: HTTP
    routes:
    - backends:
      - mcp:
          targets:
          - name: todo
            mcp:
              host: http://localhost:8000/mcp
      matches:
      - path:
          exact: /mcp
      - path:
          exact: /.well-known/oauth-protected-resource/mcp
      - path:
          exact: /.well-known/oauth-authorization-server/mcp
      - path:
          exact: /.well-known/oauth-authorization-server/mcp/client-registration
      policies:
        cors:
          allowOrigins:
          - '*'
          allowHeaders:
          - mcp-protocol-version
          - content-type
          exposeHeaders:
          - Mcp-Session-Id
        mcpAuthentication:
          mode: strict
          issuer: http://localhost:7080/realms/mcp
          audiences:
          - mcp-gateway
          jwks:
            url: http://localhost:7080/realms/mcp/protocol/openid-connect/certs
          provider:
            keycloak: {}
          resourceMetadata:
            resource: http://localhost:3000/mcp
            scopesSupported:
            - todo.read
            - todo.write
            bearerMethodsSupported:
            - header
        mcpAuthorization:
          rules:
          - mcp.tool.name == "todo_read" && jwt.scope.contains("todo.read")
          - mcp.tool.name == "todo_write" && jwt.scope.contains("todo.write")
llm:
  port: 4000
  models:
  - name: openai/*
    provider: openai
    params:
      apiKey: $OPENAI_API_KEY
    transformation:
      model: llmRequest.model.stripPrefix("openai/")
  providers: []
  virtualModels: []
  policies:
    cors:
      allowOrigins:
      - http://localhost:15000
      allowHeaders:
      - '*'
      allowMethods:
      - GET
      - POST
frontendPolicies:
  http:
    maxBufferSize: 33554432
config:
  modelCatalog:
  - file: base-costs.json
