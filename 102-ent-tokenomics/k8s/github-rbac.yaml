# 3-persona JWT RBAC tool filtering on the GitHub MCP backend (47 real tools).
#   readonly → read-only GitHub ops (get_/list_/search_)
#   team     → everything except destructive/admin (no delete_*, fork_*, create_repository)
#   admin    → all tools
# JWT is validated with an inline JWKS (public key) substituted by deploy.sh from
# harness/.rbac_jwks.json (generated by identities.py). Tokens are minted with the
# matching private key (gitignored). The gateway is the source of truth.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata: { name: github-jwt, namespace: agentgateway-system }
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: real-github-std
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: https://tokenomix.demo
          audiences: [agentgateway]
          jwks:
            inline: '__JWKS_INLINE__'
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata: { name: github-rbac, namespace: agentgateway-system }
spec:
  targetRefs:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
      name: real-github-std
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            - 'jwt.role == "admin"'
            - 'jwt.role == "team" && !(mcp.tool.name.startsWith("delete_") || mcp.tool.name.startsWith("fork_") || mcp.tool.name == "create_repository")'
            - 'jwt.role == "readonly" && (mcp.tool.name.startsWith("get_") || mcp.tool.name.startsWith("list_") || mcp.tool.name.startsWith("search_"))'
