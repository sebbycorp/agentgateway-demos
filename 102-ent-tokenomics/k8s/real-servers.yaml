# Real MCP server fronted by AGW: the reference "everything" server (13
# heterogeneous tools), stdio bridged to SSE via supergateway, so the AGW MCP
# backend (network/SSE target) can front it. Credential-free.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-real-everything
  namespace: agentgateway-system
  labels: { app: mcp-real-everything, mcp-real: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-real-everything } }
  template:
    metadata: { labels: { app: mcp-real-everything, mcp-real: "true" } }
    spec:
      containers:
        - name: bridge
          image: node:22
          # Pinned package versions (supply-chain hygiene).
          command: ["npx", "-y", "supergateway@3.4.3",
                    "--stdio", "npx -y @modelcontextprotocol/server-everything@2026.1.26",
                    "--port", "8000", "--healthEndpoint", "/healthz"]
          ports: [{ containerPort: 8000, name: http }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata: { name: mcp-real-everything, namespace: agentgateway-system }
spec:
  selector: { app: mcp-real-everything }
  ports: [{ name: http, port: 80, targetPort: 8000 }]
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata: { name: real-everything-std, namespace: agentgateway-system }
spec:
  entMcp:
    toolMode: Standard
    targets:
      - name: everything
        static: { host: mcp-real-everything.agentgateway-system.svc.cluster.local, port: 80, protocol: SSE }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: { name: real-everything-std, namespace: agentgateway-system }
spec:
  parentRefs: [{ name: agentgateway-proxy, namespace: agentgateway-system }]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /mcp/real-everything } }]
      filters: [{ type: URLRewrite, urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /mcp } } }]
      backendRefs: [{ name: real-everything-std, group: enterpriseagentgateway.solo.io, kind: EnterpriseAgentgatewayBackend }]
