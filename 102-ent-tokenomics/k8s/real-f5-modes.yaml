    - matches: [{ path: { type: PathPrefix, value: /mcp/real-f5-codesearch } }]
      filters: [{ type: URLRewrite, urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /mcp } } }]
      backendRefs: [{ name: real-f5-codesearch, group: enterpriseagentgateway.solo.io, kind: EnterpriseAgentgatewayBackend }]
